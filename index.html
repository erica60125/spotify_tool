<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Podcast Launcher - Ultimate Controller</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="播客啟動器">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>PODCAST</h1>

        <div class="glass-card">
            <label class="label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5"></path></svg>
                API Credentials
            </label>
            <input type="text" id="clientIdInput" placeholder="輸入你的 Spotify Client ID">
            <button class="btn-text-action" id="authBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline></svg>
                連結 Spotify 帳號
            </button>
            <div id="authStatus">📶 狀態：等待連線</div>
        </div>

        <div class="glass-card">
            <label class="label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                Target Show
            </label>
            <div class="current-status" id="currentSelection">尚未設定節目</div>
            <input type="text" id="podcastUrl" placeholder="貼上 Spotify 節目網址...">
            <button class="btn-text-action btn-blue" id="saveBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline></svg>
                儲存節目設定
            </button>
        </div>

        <div class="glass-card row">
            <label class="label" style="margin: 0;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                單集循環播放
            </label>
            <label class="switch">
                <input type="checkbox" id="repeatSwitch">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-start" id="startBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
            START 搜尋並開播最新一集
        </button>

        <div class="glass-card" id="playerPanel">
            <label class="label" style="color: #4facfe; margin-bottom: 12px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><line x1="9" y1="9" x2="9" y2="15"></line><line x1="15" y1="9" x2="15" y2="15"></line></svg>
                Now Playing
            </label>
            <div class="track-title" id="trackTitle">未在播放</div>
            <div class="track-artist">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path></svg>
                <span id="trackArtist">等待啟動自動化</span>
            </div>
            
            <div class="progress-container">
                <span class="time-text" id="timeCurrent">0:00</span>
                <input type="range" class="progress-bar" id="progressBar" min="0" max="100" value="0">
                <span class="time-text" id="timeTotal">0:00</span>
            </div>

            <div class="controls-row">
                <button class="btn-control-sub" id="panelRepeatBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                </button>

                <button class="btn-control" id="prevBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="5" x2="5" y2="19" stroke="currentColor" stroke-width="2.5"></line></svg>
                </button>
                
                <button class="btn-control toggle-btn" id="playToggleBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
                </button>
                
                <button class="btn-control" id="nextBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2.5"></line></svg>
                </button>

                <button class="btn-control-sub" style="opacity: 0.3; cursor: default;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a5 5 0 0 0-5 5v12a5 5 0 0 0 10 0V6a5 5 0 0 0-5-5z"></path></svg>
                </button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
